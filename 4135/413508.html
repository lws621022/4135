<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大魚吃小魚 - Emoji 海洋大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #075985;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        #menu, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 1);
            padding: 2.5rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            min-width: 320px;
            z-index: 20;
        }
        .btn {
            background: #0284c7;
            color: white;
            padding: 12px 35px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            font-weight: bold;
            transition: all 0.2s;
            margin-top: 1.5rem;
            pointer-events: auto;
            box-shadow: 0 4px 0 #0369a1;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0369a1;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="text-3xl font-black mb-1">分數: <span id="scoreDisplay">0</span></div>
        <div class="text-xl font-bold opacity-90">等級: <span id="levelDisplay">1</span></div>
    </div>

    <!-- 開始選單 -->
    <div id="menu">
        <h1 class="text-4xl font-black text-sky-600 mb-4">海洋霸主 🌊</h1>
        <p class="text-gray-700 font-medium mb-6">體型進化稍微變難了！<br>你有信心成為海洋頂端的掠食者嗎？</p>
        <div class="text-5xl mb-8 flex justify-center gap-2">
            <span>🐟</span><span>➔</span><span>🐠</span><span>➔</span><span>🐡</span><span>➔</span><span>🦈</span>
        </div>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>

    <!-- 遊戲結束 -->
    <div id="game-over" class="hidden">
        <h2 class="text-4xl font-black text-red-600 mb-4">命喪魚口！</h2>
        <div class="bg-gray-100 p-4 rounded-xl mb-6">
            <p class="text-xl mb-1 text-gray-600">本次得分</p>
            <p class="text-4xl font-black text-sky-600"><span id="finalScore">0</span></p>
        </div>
        <p class="text-gray-500 font-bold mb-6">最高紀錄: <span id="highScore">0</span></p>
        <button class="btn" onclick="startGame()">不服氣再玩一次</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');
    const highScoreDisplay = document.getElementById('highScore');
    const menu = document.getElementById('menu');
    const gameOverScreen = document.getElementById('game-over');

    let animationId;
    let score = 0;
    let highScore = localStorage.getItem('fishGameHighScore') || 0;
    let gameActive = false;
    let bubbles = [];

    // 玩家物件
    let player = {
        x: 0,
        y: 0,
        size: 35, // 初始體型
        targetX: 0,
        targetY: 0,
        emoji: '🐟',
        speed: 0.16,
        flip: false
    };

    let enemies = [];
    const enemyEmojis = ['🐟', '🐠', '🐡', '🐙', '🦑', '🦐', '🦀', '🐬', '🦈', '🐳', '🐋'];
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 背景泡泡
    for(let i=0; i<25; i++) {
        bubbles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 5 + 2,
            speed: Math.random() * 0.8 + 0.3
        });
    }

    const updateTarget = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        player.targetX = x;
        player.targetY = y;
        if (x > player.x) player.flip = true;
        else if (x < player.x) player.flip = false;
    };

    window.addEventListener('mousemove', updateTarget);
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        updateTarget(e);
    }, { passive: false });

    function startGame() {
        score = 0;
        gameActive = true;
        enemies = [];
        player.size = 35;
        player.emoji = '🐟';
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        player.targetX = player.x;
        player.targetY = player.y;
        
        menu.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        updateUI();
        gameLoop();
    }

    function createEnemy() {
        if (enemies.length > 22) return; // 稍微增加敵魚密度

        let x, y, vx, vy;
        const sizeBase = player.size;
        // 敵人大小分佈：保持挑戰性
        const size = Math.max(12, sizeBase * (0.2 + Math.random() * 1.7));
        
        if (Math.random() > 0.5) {
            x = Math.random() > 0.5 ? -100 : canvas.width + 100;
            y = Math.random() * canvas.height;
            vx = (x < 0 ? 1 : -1) * (1.2 + Math.random() * 2.5);
            vy = (Math.random() - 0.5) * 1.2;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() > 0.5 ? -100 : canvas.height + 100;
            vx = (Math.random() - 0.5) * 1.2;
            vy = (y < 0 ? 1 : -1) * (1.2 + Math.random() * 2.5);
        }

        let emojiIndex = Math.floor((size / 200) * enemyEmojis.length);
        emojiIndex = Math.min(emojiIndex, enemyEmojis.length - 1);
        const emoji = enemyEmojis[emojiIndex];

        enemies.push({ x, y, vx, vy, size, emoji });
    }

    function updateUI() {
        scoreDisplay.innerText = Math.floor(score);
        levelDisplay.innerText = Math.floor(score / 150) + 1; // 升級門檻變寬
        
        // 進化門檻大幅調高
        if (score > 1200) player.emoji = '🦈';
        else if (score > 500) player.emoji = '🐡';
        else if (score > 150) player.emoji = '🐠';
        else player.emoji = '🐟';
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        if (score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('fishGameHighScore', highScore);
        }
        
        finalScoreDisplay.innerText = Math.floor(score);
        highScoreDisplay.innerText = highScore;
        gameOverScreen.classList.remove('hidden');
    }

    function gameLoop() {
        if (!gameActive) return;

        ctx.fillStyle = '#075985';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 泡泡效果
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        bubbles.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
            b.y -= b.speed;
            if (b.y < -20) {
                b.y = canvas.height + 20;
                b.x = Math.random() * canvas.width;
            }
        });

        player.x += (player.targetX - player.x) * player.speed;
        player.y += (player.targetY - player.y) * player.speed;

        ctx.save();
        ctx.translate(player.x, player.y);
        if (player.flip) ctx.scale(-1, 1);
        ctx.font = `${player.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(player.emoji, 0, 0);
        ctx.restore();

        if (Math.random() > 0.92) createEnemy();

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.x += e.vx;
            e.y += e.vy;

            ctx.save();
            ctx.translate(e.x, e.y);
            if (e.vx > 0) ctx.scale(-1, 1);
            ctx.font = `${e.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.emoji, 0, 0);
            ctx.restore();

            const dist = Math.hypot(player.x - e.x, player.y - e.y);
            if (dist < (player.size + e.size) * 0.35) {
                if (player.size >= e.size * 0.95) {
                    // 吃掉邏輯：成長率從 0.15 降至 0.08，讓成長更緩慢紮實
                    score += e.size * 0.6;
                    player.size += e.size * 0.08; 
                    enemies.splice(i, 1);
                    updateUI();
                } else {
                    gameOver();
                }
            }

            if (e.x < -150 || e.x > canvas.width + 150 || e.y < -150 || e.y > canvas.height + 150) {
                enemies.splice(i, 1);
            }
        }

        animationId = requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
