<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji 水果接接樂：炸彈危機！</title>
    <style>
        body { 
            margin: 0; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #222; 
            overflow: hidden; 
            color: white;
        }
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: linear-gradient(#1a2a6c, #b21f1f, #fdbb2d); /* 漸層背景 */
            overflow: hidden; 
            touch-action: none; 
        }
        #basket { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            font-size: 60px; 
            transform: translateX(-50%); 
            user-select: none; 
            z-index: 10;
            transition: transform 0.1s ease-out;
        }
        .item { 
            position: absolute; 
            font-size: 45px; 
            user-select: none; 
            will-change: transform;
        }
        #stats { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            text-align: left; 
            font-size: 24px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 100;
        }
        #game-over { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(255, 255, 255, 0.9); 
            color: #333;
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            z-index: 200;
        }
        button { 
            padding: 12px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            background: #ff4b2b; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover { background: #ff416c; }
        
        /* 閃爍效果 */
        .flash-red { animation: flash 0.3s; }
        @keyframes flash {
            0% { background: rgba(255,0,0,0); }
            50% { background: rgba(255,0,0,0.5); }
            100% { background: rgba(255,0,0,0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">
        得分: <span id="score">0</span><br>
        生命: <span id="lives">❤️❤️❤️</span>
    </div>
    <div id="basket">🧺</div>
    
    <div id="game-over">
        <h1 id="msg">遊戲結束! 💣</h1>
        <p>最終得分: <span id="final-score">0</span></p>
        <button onclick="resetGame()">再挑戰一次</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const basket = document.getElementById('basket');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    let score = 0;
    let lives = 3;
    let isGameOver = false;
    let spawnRate = 1000;
    let gameTimer;

    const fruits = ['🍎', '🍊', '🍇', '🍉', '🍍', '🍓', '🍌', '🍒'];
    const bomb = '💣';
    const gold = '✨';

    // 移動控制
    function moveBasket(x) {
        if (isGameOver) return;
        let targetX = Math.max(40, Math.min(window.innerWidth - 40, x));
        basket.style.left = targetX + 'px';
    }

    container.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        moveBasket(e.touches[0].clientX);
    }, {passive: false});

    window.addEventListener('keydown', (e) => {
        let currentLeft = basket.offsetLeft;
        if (e.key === 'ArrowLeft') moveBasket(currentLeft - 50);
        if (e.key === 'ArrowRight') moveBasket(currentLeft + 50);
    });

    function createItem() {
        if (isGameOver) return;

        const item = document.createElement('div');
        item.className = 'item';
        
        // 隨機決定掉落物品 (水果、炸彈或黃金)
        let rand = Math.random();
        let type = 'fruit';
        
        if (rand < 0.15) { // 15% 炸彈
            item.innerHTML = bomb;
            type = 'bomb';
        } else if (rand > 0.95) { // 5% 黃金
            item.innerHTML = gold;
            type = 'gold';
        } else {
            item.innerHTML = fruits[Math.floor(Math.random() * fruits.length)];
            type = 'fruit';
        }

        item.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        item.style.top = '-60px';
        container.appendChild(item);
        
        let top = -60;
        let speed = 4 + (score / 150) + Math.random() * 2; // 隨得分增加速度

        const fall = setInterval(() => {
            if (isGameOver) { clearInterval(fall); item.remove(); return; }
            
            top += speed;
            item.style.top = top + 'px';

            const basketRect = basket.getBoundingClientRect();
            const itemRect = item.getBoundingClientRect();

            // 碰撞檢測
            if (
                itemRect.bottom >= basketRect.top + 10 &&
                itemRect.right >= basketRect.left &&
                itemRect.left <= basketRect.right &&
                itemRect.top <= basketRect.bottom
            ) {
                if (type === 'bomb') {
                    lives--;
                    triggerFlash();
                    updateLives();
                    if (lives <= 0) endGame();
                } else if (type === 'gold') {
                    score += 50;
                } else {
                    score += 10;
                }
                
                scoreEl.innerText = score;
                clearInterval(fall);
                item.remove();
                
                // 每過 100 分加速
                if (score > 0 && score % 100 === 0) {
                    adjustDifficulty();
                }
            }

            if (top > window.innerHeight) {
                if (type !== 'bomb' && type !== 'gold') { // 漏掉水果也扣命
                    lives--;
                    updateLives();
                    if (lives <= 0) endGame();
                }
                clearInterval(fall);
                item.remove();
            }
        }, 20);
    }

    function triggerFlash() {
        container.classList.add('flash-red');
        setTimeout(() => container.classList.remove('flash-red'), 300);
    }

    function updateLives() {
        livesEl.innerText = '❤️'.repeat(Math.max(0, lives));
    }

    function adjustDifficulty() {
        clearInterval(gameTimer);
        spawnRate = Math.max(300, 1000 - (score / 5));
        gameTimer = setInterval(createItem, spawnRate);
    }

    function endGame() {
        isGameOver = true;
        gameOverScreen.style.display = 'block';
        finalScoreEl.innerText = score;
    }

    function resetGame() {
        score = 0;
        lives = 3;
        isGameOver = false;
        spawnRate = 1000;
        scoreEl.innerText = '0';
        updateLives();
        gameOverScreen.style.display = 'none';
        clearInterval(gameTimer);
        gameTimer = setInterval(createItem, spawnRate);
    }

    // 啟動遊戲
    gameTimer = setInterval(createItem, spawnRate);
</script>

</body>
</html>
