<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>經典俄羅斯方塊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }

        canvas {
            border: 4px solid #4e4e6a;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            min-width: 120px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #4e4e6a;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="flex flex-col md:flex-row gap-6 items-start">
        <!-- 遊戲主畫面 -->
        <div class="relative">
            <canvas id="tetris" width="300" height="600"></canvas>
            
            <!-- 覆蓋層 (開始/遊戲結束) -->
            <div id="overlay">
                <h1 id="overlay-title" class="pixel-font text-2xl mb-6 text-yellow-400">TETRIS</h1>
                <p id="final-score" class="mb-4 hidden text-lg text-gray-300">分數: 0</p>
                <button id="start-btn" class="pixel-font bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-full text-sm transition-transform active:scale-90">
                    開始遊戲
                </button>
            </div>
        </div>

        <!-- 側邊欄：資訊與下一個 -->
        <div class="flex flex-col gap-4 w-full md:w-auto">
            <div class="stats-card">
                <p class="text-xs text-gray-400 uppercase mb-1">分數</p>
                <p id="score" class="pixel-font text-xl text-green-400">0</p>
            </div>
            
            <div class="stats-card">
                <p class="text-xs text-gray-400 uppercase mb-1">等級</p>
                <p id="level" class="pixel-font text-xl text-blue-400">1</p>
            </div>

            <div class="stats-card">
                <p class="text-xs text-gray-400 uppercase mb-2">下一個</p>
                <canvas id="next" width="100" height="100"></canvas>
            </div>

            <!-- 移動端控制鈕 (僅在小螢幕明顯) -->
            <div class="controls-grid md:hidden">
                <div></div>
                <div class="control-btn" id="ctrl-up">↻</div>
                <div></div>
                <div class="control-btn" id="ctrl-left">←</div>
                <div class="control-btn" id="ctrl-down">↓</div>
                <div class="control-btn" id="ctrl-right">→</div>
            </div>
            
            <div class="hidden md:block text-xs text-gray-500 mt-4 leading-relaxed">
                操作說明：<br>
                ← → : 左右移動<br>
                ↑ : 旋轉方塊<br>
                ↓ : 加速下落<br>
                空白鍵 : 直接到底
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextContext = nextCanvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const finalScoreDisplay = document.getElementById('final-score');

    const ROW = 20;
    const COL = 10;
    const SQ = 30; // 每個方塊的大小
    const VACANT = "transparent"; // 空白顏色

    // 方塊顏色定義
    const COLORS = [
        null,
        '#FF0D72', // T
        '#0DC2FF', // I
        '#0DFF72', // S
        '#F538FF', // Z
        '#FF8E0D', // L
        '#FFE138', // O
        '#3877FF'  // J
    ];

    // 方塊形狀矩陣
    const SHAPES = [
        [],
        [[0, 1, 0], [1, 1, 1], [0, 0, 0]], // T
        [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]], // I
        [[0, 3, 3], [3, 3, 0], [0, 0, 0]], // S
        [[4, 4, 0], [0, 4, 4], [0, 0, 0]], // Z
        [[5, 0, 0], [5, 5, 5], [0, 0, 0]], // L
        [[6, 6], [6, 6]], // O
        [[0, 0, 7], [7, 7, 7], [0, 0, 0]]  // J
    ];

    let board = [];
    let score = 0;
    let level = 1;
    let gameRunning = false;
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    // 初始化遊戲盤面
    function initBoard() {
        board = [];
        for (let r = 0; r < ROW; r++) {
            board[r] = [];
            for (let c = 0; c < COL; c++) {
                board[r][c] = 0;
            }
        }
    }

    // 繪製單個方格
    function drawSquare(x, y, color, ctx = context) {
        if (color === 0) {
            ctx.clearRect(x * SQ, y * SQ, SQ, SQ);
            return;
        }
        ctx.fillStyle = color;
        ctx.fillRect(x * SQ, y * SQ, SQ, SQ);
        ctx.strokeStyle = "rgba(0,0,0,0.3)";
        ctx.strokeRect(x * SQ, y * SQ, SQ, SQ);
        
        // 加入高光效果讓方塊更立體
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.fillRect(x * SQ, y * SQ, SQ, SQ / 4);
    }

    function drawBoard() {
        context.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < ROW; r++) {
            for (let c = 0; c < COL; c++) {
                if (board[r][c] !== 0) {
                    drawSquare(c, r, COLORS[board[r][c]]);
                }
            }
        }
    }

    // 當前方塊物件
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        nextMatrix: null,
        score: 0
    };

    function createPiece(type) {
        return SHAPES[type];
    }

    function playerReset() {
        if (!player.nextMatrix) {
            player.nextMatrix = createPiece((Math.random() * 7 | 0) + 1);
        }
        player.matrix = player.nextMatrix;
        player.nextMatrix = createPiece((Math.random() * 7 | 0) + 1);
        player.pos.y = 0;
        player.pos.x = (COL / 2 | 0) - (player.matrix[0].length / 2 | 0);
        
        // 檢查是否一出生就碰撞 (遊戲結束)
        if (collide(board, player)) {
            gameOver();
        }
        drawNext();
    }

    function drawNext() {
        nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        const matrix = player.nextMatrix;
        const size = matrix.length;
        const offsetX = (nextCanvas.width / 20 - size / 2);
        const offsetY = (nextCanvas.height / 20 - size / 2);
        
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    // 在 Next 視窗使用縮小比例的繪製
                    const s = 25;
                    const ox = (nextCanvas.width - size * s) / 2;
                    const oy = (nextCanvas.height - size * s) / 2;
                    nextContext.fillStyle = COLORS[value];
                    nextContext.fillRect(ox + x * s, oy + y * s, s, s);
                    nextContext.strokeStyle = "black";
                    nextContext.strokeRect(ox + x * s, oy + y * s, s, s);
                }
            });
        });
    }

    // 碰撞偵測
    function collide(board, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    // 將方塊合併進盤面
    function merge(board, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    board[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    // 旋轉矩陣
    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [
                    matrix[x][y],
                    matrix[y][x],
                ] = [
                    matrix[y][x],
                    matrix[x][y],
                ];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(board, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(board, player)) {
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(board, player)) {
            player.pos.x -= dir;
        }
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = board.length - 1; y > 0; --y) {
            for (let x = 0; x < board[y].length; ++x) {
                if (board[y][x] === 0) {
                    continue outer;
                }
            }
            const row = board.splice(y, 1)[0].fill(0);
            board.unshift(row);
            ++y;

            player.score += rowCount * 10;
            rowCount *= 2;
        }
        
        // 提升難度
        level = Math.floor(player.score / 100) + 1;
        dropInterval = Math.max(100, 1000 - (level - 1) * 100);
    }

    function updateScore() {
        scoreElement.innerText = player.score;
        levelElement.innerText = level;
    }

    function draw() {
        drawBoard();
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    drawSquare(x + offset.x, y + offset.y, COLORS[value]);
                }
            });
        });
    }

    function update(time = 0) {
        if (!gameRunning) return;
        
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    function gameOver() {
        gameRunning = false;
        overlay.classList.remove('hidden');
        overlayTitle.innerText = "遊戲結束";
        overlayTitle.classList.add('text-red-500');
        finalScoreDisplay.innerText = `最終得分: ${player.score}`;
        finalScoreDisplay.classList.remove('hidden');
        startBtn.innerText = "再玩一次";
    }

    function startGame() {
        initBoard();
        player.score = 0;
        level = 1;
        dropInterval = 1000;
        updateScore();
        playerReset();
        gameRunning = true;
        overlay.classList.add('hidden');
        lastTime = performance.now();
        update();
    }

    // 事件監聽
    document.addEventListener('keydown', event => {
        if (!gameRunning) return;
        if (event.keyCode === 37) { // Left
            playerMove(-1);
        } else if (event.keyCode === 39) { // Right
            playerMove(1);
        } else if (event.keyCode === 40) { // Down
            playerDrop();
        } else if (event.keyCode === 38) { // Up (Rotate)
            playerRotate(1);
        } else if (event.keyCode === 32) { // Space (Hard Drop)
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
    });

    // 手機控制按鈕
    document.getElementById('ctrl-left').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(-1); });
    document.getElementById('ctrl-right').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(1); });
    document.getElementById('ctrl-down').addEventListener('touchstart', (e) => { e.preventDefault(); playerDrop(); });
    document.getElementById('ctrl-up').addEventListener('touchstart', (e) => { e.preventDefault(); playerRotate(1); });

    startBtn.addEventListener('click', startGame);

    // 初始畫面
    initBoard();
    drawBoard();
</script>
</body>
</html>
