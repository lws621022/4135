<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>學生遊戲作品集</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f7f9fc 100%);
      color: #1f2937;
    }

    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #1e3a8a;
    }

    .hero p {
      margin-top: 14px;
      font-size: 18px;
      color: #475569;
    }

    .class-section {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      padding: 28px 24px 32px;
      margin-bottom: 32px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(8px);
    }

    .class-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 2px solid #e5e7eb;
    }

    .class-title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      color: #0f172a;
    }

    .class-badge {
      padding: 8px 16px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 15px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 18px;
    }

    .student-card {
      display: block;
      text-decoration: none;
      background: #ffffff;
      border-radius: 18px;
      padding: 22px 12px;
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #2563eb;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.10);
      border: 1px solid #e5e7eb;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .student-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.18);
      background: #eff6ff;
    }

    .student-id {
      display: block;
      font-size: 28px;
      line-height: 1.2;
    }

    .student-text {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      color: #64748b;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .wrapper {
        padding: 28px 16px 60px;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 16px;
      }

      .class-title {
        font-size: 24px;
      }

      .student-card {
        padding: 18px 10px;
      }

      .student-id {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="hero">
      <h1>學生遊戲作品集</h1>
      <p>資處科 HTML / JavaScript 遊戲成果展示</p>
    </header>

    <section class="class-section">
      <div class="class-header">
        <h2 class="class-title">一年戊班</h2>
        <div class="class-badge">共 34 份作品</div>
      </div>
      <div class="grid" id="class4135"></div>
    </section>

    <section class="class-section">
      <div class="class-header">
        <h2 class="class-title">一年己班 班</h2>
        <div class="class-badge">共 34 份作品</div>
      </div>
      <div class="grid" id="class4136"></div>
    </section>

    <div class="footer">
      歡迎點選學號進入學生作品
    </div>
  </div>

  <script>
    function createCard(id) {
      return `
        <a class="student-card" href="${id}.html" target="_blank">
          <span class="student-id">${id}</span>
          <span class="student-text">點我開啟作品</span>
        </a>
      `;
    }

    for (let i = 413501; i <= 413534; i++) {
      document.getElementById("class4135").innerHTML += createCard(i);
    }

    for (let i = 413601; i <= 413634; i++) {
      document.getElementById("class4136").innerHTML += createCard(i);
    }
  </script>
</body>
</html>
